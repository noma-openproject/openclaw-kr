appId: kr.openclaw.noma
productName: Noma
copyright: Copyright © 2026 openclaw-kr contributors

directories:
  output: dist-app
  buildResources: assets

files:
  - launcher/**/*
  - "!launcher/ui/src/**"
  - "!launcher/ui/node_modules/**"
  - "!launcher/ui/tsconfig*.json"
  - "!launcher/ui/vite.config.ts"
  - plugins/**/*
  - "!plugins/**/test/**"
  - package.json
  - node_modules/**/*

asar: true
asarUnpack:
  - "node_modules/**"

mac:
  category: public.app-category.developer-tools
  target:
    - target: dmg
      arch: [arm64, x64]

win:
  target:
    - target: nsis
      arch: [x64]

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true

linux:
  target:
    - target: AppImage
      arch: [x64]
  category: Development
